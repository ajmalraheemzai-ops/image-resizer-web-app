<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizer | Ajmal Abdulrahimzai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="wrapper">
      <h2>Image Resizer</h2>

      <div class="upload-box">
        <input type="file" accept="image/*" hidden>
        <img src="upload-icon.svg" alt="">
        <p>Click or Drag Image Here</p>
      </div>

      <div class="content">
        <div class="row sizes">
          <div class="column width">
            <label>Width</label>
            <input type="number">
          </div>
          <div class="column height">
            <label>Height</label>
            <input type="number">
          </div>
        </div>

        <div class="row checkboxes">
          <div class="column">
            <input type="checkbox" id="ratio" checked>
            <label for="ratio">Lock ratio</label>
          </div>
          <div class="column">
            <input type="checkbox" id="quality">
            <label for="quality">Reduce quality</label>
          </div>
        </div>

        <button class="download-btn">Download Image</button>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p>Developed & Designed by <strong>Ajmal Abdulrahimzai</strong></p>

      <div class="socials">
        <a href="https://www.facebook.com/share/1E6oE5opLh/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/ajmal_abdulrahimzai?igsh=MWh4ZXg2ZmZ4NHptMw==" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/ajmal-abdulrahimzai-2ab88a91" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://x.com/Ajmal_raheemzai" target="_blank"><i class="fab fa-x-twitter"></i></a>
      </div>
    </footer>
  </div>

</body>
</html>
